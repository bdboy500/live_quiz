<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Path for curved Bengali text along bottom -->
    <path id="text-curve" d="M 85,305 A 175,175 0 0,0 427,305" fill="none" />
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Base Circle Background -->
  <circle cx="256" cy="256" r="240" fill="#FAF9F6" />

  <!-- Outer Dark Navy Ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="#0F2038" stroke-width="22" />

  <!-- Inner Vibrant Orange Ring -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="#FF6A00" stroke-width="18" />

  <!-- TOP GRADUATION CAP & OPEN BOOK ICON -->
  <g transform="translate(256, 155) scale(1.1)" filter="url(#shadow)">
    <!-- Mortarboard Cap -->
    <path d="M 0,-42 L 50,-20 L 0,-2 L -50,-20 Z" fill="#0F2038" />
    <path d="M -28,-10 L -28,12 C -28,20 28,20 28,12 L 28,-10" fill="#0F2038" />
    <!-- Tassel -->
    <path d="M -38,-15 L -44,8 L -40,10 L -36,8 Z" fill="#0F2038" />
    <circle cx="-38" cy="-15" r="2.5" fill="#FF6A00" />
    
    <!-- Open Book -->
    <path d="M -32,2 L 0,10 L 32,2 L 32,26 C 20,29 10,28 0,22 C -10,28 -20,29 -32,26 Z" fill="none" stroke="#0F2038" stroke-width="5" stroke-linejoin="round" />
    <path d="M 0,10 L 0,22" stroke="#0F2038" stroke-width="4" />
  </g>

  <!-- CENTER BRAND TEXT "JOB MASTER" -->
  <!-- "JOB" -->
  <text x="256" y="278" font-family="'Inter', 'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="92" fill="#0F2038" text-anchor="middle" letter-spacing="3">JOB</text>

  <!-- "MASTER" -->
  <text x="256" y="348" font-family="'Inter', 'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="78" fill="#FF6A00" text-anchor="middle" letter-spacing="2">MASTER</text>

  <!-- Divider Line under MASTER -->
  <line x1="180" y1="364" x2="332" y2="364" stroke="#FF6A00" stroke-width="4" stroke-linecap="round" />

  <!-- BENGALI CURVED SLOGAN "চাকরি এখন হাতের মুঠোয়!" -->
  <text font-family="'Kalpurush', 'SolaimanLipi', 'Noto Sans Bengali', sans-serif" font-weight="800" font-size="29" fill="#0F2038" letter-spacing="0.5">
    <textPath href="#text-curve" startOffset="50%" text-anchor="middle">
      চাকরি এখন হাতের মুঠোয়!
    </textPath>
  </text>
</svg>
